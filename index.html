<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard (Stable Grid)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .section { margin-bottom: 30px; }

    .results, .group {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    /* 🔥 GRID SCOREBOARD (no table flicker possible) */
    .grid-header, .grid-row {
      display: grid;
      grid-template-columns: 2fr repeat(7, 1fr);
      padding: 6px 0;
      align-items: center;
    }

    .grid-header {
      font-weight: bold;
      border-bottom: 2px solid #ddd;
      background: #fafafa;
    }

    .grid-row {
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .grid-container {
      margin-top: 10px;
    }

    .grid-group {
      margin-top: 20px;
    }

    .group-title {
      font-size: 18px;
      margin-bottom: 5px;
    }

    /* soft update banner */
    #updateBanner {
      display: none;
      margin-bottom: 10px;
      padding: 10px;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #007bff;
      color: white;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<h1>🏆 Tournament Dashboard</h1>

<div id="updateBanner">
  🟡 New updates available
  <button onclick="manualRefresh()">Refresh</button>
</div>

<div id="results" class="section results">
  <h2>Live Results</h2>
</div>

<div id="groups" class="section"></div>

<script>

const BASE_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAQdMH5d5-6lGZzC9BD0RRnFu9wrnZSWMD93pKCV7X_yrbcKCDsnxKX1gzSgf6fxvSxTWPZNKwkDBl/pub?gid=892945414&single=true&output=csv";

/* ---------------- STATE ---------------- */
let lastHash = "";
let resultNodes = [];
let groupNodes = {}; // keyed by group
let teamRows = {};   // keyed by group+team

/* ---------------- FETCH ---------------- */
async function fetchData() {
  const res = await fetch(BASE_URL + "&_=" + Date.now(), { cache: "no-store" });
  const text = await res.text();

  const rows = text.trim()
    .split("\n")
    .map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/));

  const headers = rows[0];

  return rows.slice(1)
    .filter(r => r.join("").trim() !== "")
    .map(row => {
      let obj = {};
      headers.forEach((h, i) => obj[h.trim()] = (row[i] || "").trim());
      return obj;
    });
}

/* ---------------- HASH ---------------- */
function createHash(data) {
  return data.map(r =>
    `${r.Group}|${r.TeamA}|${r.TeamB}|${r.ScoreA}|${r.ScoreB}|${r.Played}`
  ).join("~");
}

/* ---------------- GROUP ---------------- */
function groupMatches(matches) {
  const groups = {};
  matches.forEach(m => {
    const g = m.Group || "UNKNOWN";
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });
  return groups;
}

/* ---------------- LADDER ---------------- */
function buildLadder(matches) {
  const table = {};

  matches.forEach(m => {
    if (String(m.Played || "").toUpperCase() !== "TRUE") return;

    const a = m.TeamA;
    const b = m.TeamB;
    const sa = +m.ScoreA || 0;
    const sb = +m.ScoreB || 0;

    if (!table[a]) table[a] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };
    if (!table[b]) table[b] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };

    table[a].P++; table[b].P++;
    table[a].F += sa; table[a].A += sb;
    table[b].F += sb; table[b].A += sa;

    if (sa > sb) {
      table[a].W++; table[b].L++; table[a].Pts += 3;
    } else if (sb > sa) {
      table[b].W++; table[a].L++; table[b].Pts += 3;
    } else {
      table[a].D++; table[b].D++; table[a].Pts++; table[b].Pts++;
    }
  });

  return Object.entries(table).map(([team, s]) => ({ team, ...s }));
}

/* ---------------- RESULTS (STABLE) ---------------- */
function renderResults(matches) {
  const container = document.getElementById("results");

  const completed = matches
    .filter(m => String(m.Played || "").toUpperCase() === "TRUE")
    .reverse();

  if (!container.dataset.init) {
    container.innerHTML = "<h2>Live Results</h2>";
    container.dataset.init = "true";
  }

  while (resultNodes.length < completed.length) {
    const div = document.createElement("div");
    div.className = "result-item";
    container.appendChild(div);
    resultNodes.push(div);
  }

  completed.forEach((m, i) => {
    const text = `${m.TeamA} ${m.ScoreA} - ${m.ScoreB} ${m.TeamB}`;
    if (resultNodes[i].textContent !== text) {
      resultNodes[i].textContent = text;
    }
  });

  while (resultNodes.length > completed.length) {
    resultNodes.pop().remove();
  }
}

/* ---------------- GROUPS (GRID + KEYED LOCKING) ---------------- */
function renderGroups(matches) {
  const container = document.getElementById("groups");

  const groups = groupMatches(matches);

  Object.keys(groups).sort().forEach(g => {
    const ladder = buildLadder(groups[g]);

    if (!groupNodes[g]) {
      const wrapper = document.createElement("div");
      wrapper.className = "group";

      const title = document.createElement("div");
      title.className = "group-title";
      title.textContent = "Group " + g;

      const grid = document.createElement("div");
      grid.className = "grid-container";

      const header = document.createElement("div");
      header.className = "grid-header";
      header.innerHTML = `
        <div>Team</div><div>P</div><div>W</div><div>D</div>
        <div>L</div><div>F</div><div>A</div><div>Pts</div>
      `;

      grid.appendChild(header);
      wrapper.appendChild(title);
      wrapper.appendChild(grid);
      container.appendChild(wrapper);

      groupNodes[g] = { grid, rows: {} };
    }

    const gNode = groupNodes[g];

    ladder.forEach(t => {
      const key = g + ":" + t.team;

      if (!gNode.rows[key]) {
        const row = document.createElement("div");
        row.className = "grid-row";

        row.innerHTML = `
          <div></div><div></div><div></div><div></div>
          <div></div><div></div><div></div><div></div>
        `;

        gNode.grid.appendChild(row);
        gNode.rows[key] = row;
      }

      const row = gNode.rows[key].children;

      row[0].textContent = t.team;
      row[1].textContent = t.P;
      row[2].textContent = t.W;
      row[3].textContent = t.D;
      row[4].textContent = t.L;
      row[5].textContent = t.F;
      row[6].textContent = t.A;
      row[7].textContent = t.Pts;
    });
  });
}

/* ---------------- UPDATE CONTROL ---------------- */
async function checkForUpdates() {
  const data = await fetchData();
  const hash = createHash(data);

  if (hash !== lastHash) {
    lastHash = hash;
    document.getElementById("updateBanner").style.display = "block";
  }
}

async function manualRefresh() {
  const data = await fetchData();

  lastHash = createHash(data);
  document.getElementById("updateBanner").style.display = "none";

  renderResults(data);
  renderGroups(data);
}

/* ---------------- INIT ---------------- */
manualRefresh();
setInterval(checkForUpdates, 15000);

</script>

</body>
</html>
