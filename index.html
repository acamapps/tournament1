<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .section { margin-bottom: 30px; }

    .results {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .group {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    th { background: #fafafa; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media(min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body>

<h1>🏆 Tournament Dashboard</h1>

<div id="results" class="section results"></div>
<div id="groups" class="grid section"></div>

<script>

const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAQdMH5d5-6lGZzC9BD0RRnFu9wrnZSWMD93pKCV7X_yrbcKCDsnxKX1gzSgf6fxvSxTWPZNKwkDBl/pub?gid=892945414&single=true&output=csv";

let lastHash = "";
let groupCache = {};

/* ---------------- FETCH ---------------- */
async function fetchData() {
  const res = await fetch(BASE_URL + "&_=" + Date.now(), {
    cache: "no-store"
  });

  const text = await res.text();

  const rows = text.trim()
    .split("\n")
    .map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/));

  const headers = rows[0];

  return rows.slice(1)
    .filter(r => r.join("").trim() !== "")
    .map(row => {
      let obj = {};
      headers.forEach((h, i) => {
        obj[h.trim()] = (row[i] || "").trim();
      });
      return obj;
    });
}

/* ---------------- GROUP MATCHES ---------------- */
function groupMatches(matches) {
  const groups = {};
  matches.forEach(m => {
    const g = m.Group || "UNKNOWN";
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });
  return groups;
}

/* ---------------- BUILD LADDER ---------------- */
function buildLadder(matches) {
  const table = {};

  matches.forEach(m => {
    if ((m.Played || "").trim().toUpperCase() !== "TRUE") return;
    if (!m.ScoreA || !m.ScoreB) return;

    const a = m.TeamA;
    const b = m.TeamB;
    const sa = parseInt(m.ScoreA);
    const sb = parseInt(m.ScoreB);

    if (!table[a]) table[a] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };
    if (!table[b]) table[b] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };

    table[a].P++; table[b].P++;
    table[a].F += sa; table[a].A += sb;
    table[b].F += sb; table[b].A += sa;

    if (sa > sb) {
      table[a].W++; table[b].L++;
      table[a].Pts += 3;
    } else if (sb > sa) {
      table[b].W++; table[a].L++;
      table[b].Pts += 3;
    } else {
      table[a].D++; table[b].D++;
      table[a].Pts++; table[b].Pts++;
    }
  });

  return Object.entries(table).map(([team, s]) => ({ team, ...s }));
}

/* ---------------- SORT ---------------- */
function sortLadder(ladder) {
  return ladder.sort((a,b) =>
    b.Pts - a.Pts ||
    (b.F - b.A) - (a.F - a.A) ||
    b.F - a.F ||
    a.team.localeCompare(b.team)
  );
}

/* ---------------- RESULTS FEED ---------------- */
function renderResults(matches) {
  const el = document.getElementById("results");

  const completed = matches
    .filter(m => (m.Played || "").trim().toUpperCase() === "TRUE")
    .reverse();

  let html = "<h2>Live Results</h2>";

  completed.forEach(m => {
    html += `
      <div class="result-item">
        <b>${m.TeamA}</b> ${m.ScoreA} - ${m.ScoreB} <b>${m.TeamB}</b>
      </div>`;
  });

  el.innerHTML = html;
}

/* ---------------- GROUP RENDER (NO FULL WIPE) ---------------- */
function renderGroup(name, ladder) {
  let html = `<h2>Group ${name}</h2>`;

  html += `
  <table>
    <tr>
      <th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th>
      <th>F</th><th>A</th><th>Pts</th>
    </tr>`;

  ladder.forEach(t => {
    html += `
      <tr>
        <td>${t.team}</td>
        <td>${t.P}</td>
        <td>${t.W}</td>
        <td>${t.D}</td>
        <td>${t.L}</td>
        <td>${t.F}</td>
        <td>${t.A}</td>
        <td><b>${t.Pts}</b></td>
      </tr>`;
  });

  html += "</table>";
  return html;
}

/* ---------------- INIT ---------------- */
async function init() {
  const data = await fetchData();

  const hash = data.map(r => [
    r.Group, r.TeamA, r.TeamB, r.ScoreA, r.ScoreB, r.Played
  ].join("|")).join("~");

  if (hash === lastHash) return;
  lastHash = hash;

  renderResults(data);

  const groups = groupMatches(data);
  const container = document.getElementById("groups");

  Object.keys(groups).sort().forEach(g => {
    const ladder = sortLadder(buildLadder(groups[g]));
    const html = renderGroup(g, ladder);

    let el = document.getElementById("group-" + g);

    if (!el) {
      el = document.createElement("div");
      el.className = "group";
      el.id = "group-" + g;
      container.appendChild(el);
    }

    if (el.innerHTML !== html) {
      el.innerHTML = html;
    }
  });
}

init();
setInterval(init, 5000);

</script>

</body>
</html>
