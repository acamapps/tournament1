<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard (Clean Triggered Version)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .section { margin-bottom: 30px; }

    .results {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media(min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    .group {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .grid-header, .grid-row {
      display: grid;
      grid-template-columns: 2fr repeat(7, 1fr);
      padding: 6px 0;
      align-items: center;
    }

    .grid-header {
      font-weight: bold;
      border-bottom: 2px solid #ddd;
      background: #fafafa;
    }

    .grid-row {
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    #updateBanner {
      display: none;
      margin-bottom: 10px;
      padding: 10px;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>🏆 Tournament Dashboard</h1>

<div id="updateBanner">
  🟡 Update received from Google Sheets
</div>

<div id="results" class="section results">
  <h2>Live Results</h2>
</div>

<div id="groups" class="grid section"></div>

<script>

const BASE_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAQdMH5d5-6lGZzC9BD0RRnFu9wrnZSWMD93pKCV7X_yrbcKCDsnxKX1gzSgf6fxvSxTWPZNKwkDBl/pub?gid=892945414&single=true&output=csv";

/* ---------------- STATE ---------------- */
let lastTrigger = "";
let isRefreshing = false;

/* ---------------- KEYED STORAGE ---------------- */
let resultMap = {};
let groupMap = {};

/* ---------------- FETCH ---------------- */
async function fetchData() {
  const res = await fetch(BASE_URL + "&_=" + Date.now(), {
    cache: "no-store"
  });

  const text = await res.text();

  const rows = text.trim()
    .split("\n")
    .map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/));

  const headers = rows[0];

  return rows.slice(1)
    .filter(r => r.join("").trim() !== "")
    .map(row => {
      let obj = {};
      headers.forEach((h, i) => {
        obj[h.trim()] = (row[i] || "").trim();
      });
      return obj;
    });
}

/* ---------------- RESULTS (NO DIFF LOGIC) ---------------- */
function renderResults(matches) {
  const container = document.getElementById("results");

  if (!container.dataset.init) {
    container.innerHTML = "<h2>Live Results</h2>";
    container.dataset.init = "true";
  }

  // overwrite state completely (no comparisons, no diffing)
  resultMap = {};

  matches.forEach(m => {
    const id = m.MatchID;

    if (!resultMap[id]) {
      const div = document.createElement("div");
      div.className = "result-item";
      container.appendChild(div);

      resultMap[id] = {
        el: div,
        data: m
      };
    }

    const isPlayed = String(m.Played || "").toUpperCase() === "TRUE";

    const el = resultMap[id].el;

    if (!isPlayed) {
      el.classList.add("hidden");
      el.textContent = "";
      return;
    }

    el.classList.remove("hidden");
    el.textContent = `${m.TeamA} ${m.ScoreA} - ${m.ScoreB} ${m.TeamB}`;
  });
}

/* ---------------- GROUPS (FULL REWRITE ON REFRESH ONLY) ---------------- */
function renderGroups(matches) {
  const container = document.getElementById("groups");

  container.innerHTML = ""; // full reset on refresh only
  groupMap = {};

  const groups = {};

  matches.forEach(m => {
    const g = m.Group || "UNKNOWN";
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });

  Object.keys(groups).forEach(g => {
    const list = groups[g];

    const wrapper = document.createElement("div");
    wrapper.className = "group";

    const title = document.createElement("h2");
    title.textContent = "Group " + g;

    const grid = document.createElement("div");

    grid.innerHTML = `
      <div class="grid-header">
        <div>Team</div><div>P</div><div>W</div><div>D</div>
        <div>L</div><div>F</div><div>A</div><div>Pts</div>
      </div>
    `;

    const table = {};

    list.forEach(m => {
      if (String(m.Played || "").toUpperCase() !== "TRUE") return;

      const a = m.TeamA;
      const b = m.TeamB;
      const sa = +m.ScoreA || 0;
      const sb = +m.ScoreB || 0;

      if (!table[a]) table[a] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };
      if (!table[b]) table[b] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };

      table[a].P++; table[b].P++;
      table[a].F += sa; table[a].A += sb;
      table[b].F += sb; table[b].A += sa;

      if (sa > sb) {
        table[a].W++; table[b].L++; table[a].Pts += 3;
      } else if (sb > sa) {
        table[b].W++; table[a].L++; table[b].Pts += 3;
      } else {
        table[a].D++; table[b].D++; table[a].Pts++; table[b].Pts++;
      }
    });

    const ladder = Object.entries(table).map(([team, s]) => ({ team, ...s }));

    ladder.forEach(t => {
      const row = document.createElement("div");
      row.className = "grid-row";

      row.innerHTML = `
        <div>${t.team}</div>
        <div>${t.P}</div>
        <div>${t.W}</div>
        <div>${t.D}</div>
        <div>${t.L}</div>
        <div>${t.F}</div>
        <div>${t.A}</div>
        <div>${t.Pts}</div>
      `;

      grid.appendChild(row);
    });

    wrapper.appendChild(title);
    wrapper.appendChild(grid);
    container.appendChild(wrapper);
  });
}

/* ---------------- MANUAL REFRESH (ONLY ENTRY POINT) ---------------- */
async function manualRefresh() {
  if (isRefreshing) return;
  isRefreshing = true;

  try {
    const data = await fetchData();

    renderResults(data);
    renderGroups(data);

    document.getElementById("updateBanner").style.display = "none";
  } finally {
    isRefreshing = false;
  }
}

/* ---------------- TRIGGER CHECK (Z1 ONLY, NO DATA COMPARISON) ---------------- */
async function checkTrigger() {
  const res = await fetch(BASE_URL + "&range=Z1");
  const text = (await res.text()).trim();

  if (!text || text === lastTrigger) return;

  lastTrigger = text;

  document.getElementById("updateBanner").style.display = "block";

  manualRefresh();
}

/* ---------------- START ---------------- */
manualRefresh();
setInterval(checkTrigger, 3000);

</script>

</body>
</html>
