<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .section { margin-bottom: 25px; }

    .results {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .group {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    th { background: #fafafa; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media(min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body>

<h1>🏆 Tournament Dashboard</h1>

<div id="results" class="section results"></div>
<div id="groups" class="grid section"></div>

<script>

/* ================= CONFIG ================= */

const BASE_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAQdMH5d5-6lGZzC9BD0RRnFu9wrnZSWMD93pKCV7X_yrbcKCDsnxKX1gzSgf6fxvSxTWPZNKwkDBl/pub?gid=892945414&single=true&output=csv";

/* ================= STATE ================= */

let lastGoodData = null;
let lastHash = "";

/* ================= FETCH ================= */

async function fetchData() {
  const url = `${BASE_URL}&_=${Date.now()}`;

  try {
    const res = await fetch(url, { cache: "no-store" });

    if (!res.ok) {
      console.warn("Fetch failed:", res.status);
      return lastGoodData || [];
    }

    const text = await res.text();
    if (!text || text.length < 10) {
      console.warn("Empty response");
      return lastGoodData || [];
    }

    const parsed = parseCSV(text);

    if (!isValidData(parsed)) {
      console.warn("Invalid dataset received");
      return lastGoodData || [];
    }

    return parsed;

  } catch (err) {
    console.error("Fetch error:", err);
    return lastGoodData || [];
  }
}

/* ================= CSV PARSER ================= */

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim());

  return lines.slice(1).map(line => {
    const cols = line.split(",");
    const obj = {};

    headers.forEach((h, i) => {
      obj[h] = (cols[i] || "").trim();
    });

    return obj;
  });
}

/* ================= VALIDATION ================= */

function isValidData(data) {
  if (!Array.isArray(data)) return false;
  if (data.length < 1) return false;

  const sample = data[0];

  return (
    "Group" in sample &&
    "TeamA" in sample &&
    "TeamB" in sample &&
    "Played" in sample
  );
}

/* ================= STABILITY CHECK ================= */

function shouldUpdate(newData) {
  const newHash = JSON.stringify(newData);

  if (newHash === lastHash) return false; // no change → no flicker

  if (lastGoodData && newData.length < lastGoodData.length) {
    console.warn("Suspicious row drop ignored");
    return false;
  }

  lastHash = newHash;
  lastGoodData = newData;

  return true;
}

/* ================= GROUPING ================= */

function groupMatches(matches) {
  const groups = {};

  matches.forEach(m => {
    const g = m.Group || "UNKNOWN";
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });

  return groups;
}

/* ================= LADDER ================= */

function buildLadder(matches) {
  const table = {};

  matches.forEach(m => {
    const played = (m.Played || "").trim().toUpperCase();
    if (played !== "TRUE") return;

    const sa = parseInt(m.ScoreA);
    const sb = parseInt(m.ScoreB);
    if (isNaN(sa) || isNaN(sb)) return;

    const a = m.TeamA;
    const b = m.TeamB;

    if (!table[a]) table[a] = initTeam();
    if (!table[b]) table[b] = initTeam();

    update(table[a], sa, sb);
    update(table[b], sb, sa);

    if (sa > sb) {
      table[a].W++; table[b].L++;
      table[a].Pts += 3;
    } else if (sb > sa) {
      table[b].W++; table[a].L++;
      table[b].Pts += 3;
    } else {
      table[a].D++; table[b].D++;
      table[a].Pts++; table[b].Pts++;
    }
  });

  return Object.entries(table).map(([team, s]) => ({ team, ...s }));
}

function initTeam() {
  return { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };
}

function update(obj, f, a) {
  obj.P++;
  obj.F += f;
  obj.A += a;
}

/* ================= SORT ================= */

function sortLadder(ladder) {
  return ladder.sort((a,b) =>
    b.Pts - a.Pts ||
    (b.F - b.A) - (a.F - a.A) ||
    b.F - a.F ||
    a.team.localeCompare(b.team)
  );
}

/* ================= RESULTS ================= */

function renderResults(matches) {
  const el = document.getElementById("results");

  const completed = matches
    .filter(m => (m.Played || "").trim().toUpperCase() === "TRUE")
    .reverse();

  let html = "<h2>Live Results</h2>";

  completed.forEach(m => {
    html += `
      <div class="result-item">
        <b>${m.TeamA}</b> ${m.ScoreA} - ${m.ScoreB} <b>${m.TeamB}</b>
      </div>`;
  });

  el.innerHTML = html;
}

/* ================= GROUP RENDER ================= */

function renderGroup(name, ladder) {
  const div = document.createElement("div");
  div.className = "group";

  let html = `<h2>Group ${name}</h2>`;

  html += `
  <table>
    <tr>
      <th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th>
      <th>F</th><th>A</th><th>Pts</th>
    </tr>`;

  ladder.forEach(t => {
    html += `
      <tr>
        <td>${t.team}</td>
        <td>${t.P}</td>
        <td>${t.W}</td>
        <td>${t.D}</td>
        <td>${t.L}</td>
        <td>${t.F}</td>
        <td>${t.A}</td>
        <td><b>${t.Pts}</b></td>
      </tr>`;
  });

  html += "</table>";

  div.innerHTML = html;
  return div;
}

/* ================= MAIN LOOP ================= */

async function init() {
  const data = await fetchData();

  if (!data || data.length === 0) return;

  if (!shouldUpdate(data)) return; // 🔥 prevents flicker

  renderResults(data);

  const groups = groupMatches(data);
  const container = document.getElementById("groups");

  const fragment = document.createDocumentFragment();

  Object.keys(groups).sort().forEach(g => {
    const ladder = sortLadder(buildLadder(groups[g]));
    fragment.appendChild(renderGroup(g, ladder));
  });

  container.innerHTML = "";
  container.appendChild(fragment);
}

init();
setInterval(init, 5000);

</script>
</body>
</html>
