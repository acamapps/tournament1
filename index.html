<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .section { margin-bottom: 30px; }

    .results, .group {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    th { background: #fafafa; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media(min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    /* 🔔 soft update indicator */
    #updateBanner {
      display: none;
      margin-bottom: 10px;
      padding: 10px;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff;
      color: white;
    }
  </style>
</head>

<body>

<h1>🏆 Tournament Dashboard</h1>

<div id="updateBanner">
  🟡 New updates available — click refresh
  <button onclick="manualRefresh()">Refresh Now</button>
</div>

<div id="results" class="section results">
  <h2>Live Results</h2>
</div>

<div id="groups" class="grid section"></div>

<script>

const BASE_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAQdMH5d5-6lGZzC9BD0RRnFu9wrnZSWMD93pKCV7X_yrbcKCDsnxKX1gzSgf6fxvSxTWPZNKwkDBl/pub?gid=892945414&single=true&output=csv";

let lastHash = "";
let pendingUpdate = false;

/* ---------------- FETCH ---------------- */
async function fetchData() {
  const res = await fetch(BASE_URL + "&_=" + Date.now(), {
    cache: "no-store"
  });

  const text = await res.text();

  const rows = text.trim()
    .split("\n")
    .map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/));

  const headers = rows[0];

  return rows.slice(1)
    .filter(r => r.join("").trim() !== "")
    .map(row => {
      let obj = {};
      headers.forEach((h, i) => {
        obj[h.trim()] = (row[i] || "").trim();
      });
      return obj;
    });
}

/* ---------------- HASH ---------------- */
function createHash(data) {
  return data.map(r =>
    `${r.Group}|${r.TeamA}|${r.TeamB}|${r.ScoreA}|${r.ScoreB}|${r.Played}`
  ).join("~");
}

/* ---------------- GROUPING ---------------- */
function groupMatches(matches) {
  const groups = {};
  matches.forEach(m => {
    const g = m.Group || "UNKNOWN";
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });
  return groups;
}

/* ---------------- LADDER ---------------- */
function buildLadder(matches) {
  const table = {};

  matches.forEach(m => {
    const played = String(m.Played || "").trim().toUpperCase();
    if (played !== "TRUE") return;

    const a = m.TeamA;
    const b = m.TeamB;
    const sa = parseInt(m.ScoreA) || 0;
    const sb = parseInt(m.ScoreB) || 0;

    if (!table[a]) table[a] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };
    if (!table[b]) table[b] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };

    table[a].P++; table[b].P++;
    table[a].F += sa; table[a].A += sb;
    table[b].F += sb; table[b].A += sa;

    if (sa > sb) {
      table[a].W++; table[b].L++; table[a].Pts += 3;
    } else if (sb > sa) {
      table[b].W++; table[a].L++; table[b].Pts += 3;
    } else {
      table[a].D++; table[b].D++; table[a].Pts++; table[b].Pts++;
    }
  });

  return Object.entries(table).map(([team, s]) => ({ team, ...s }));
}

function sortLadder(ladder) {
  return ladder.sort((a,b) =>
    b.Pts - a.Pts ||
    (b.F - b.A) - (a.F - a.A) ||
    b.F - a.F ||
    a.team.localeCompare(b.team)
  );
}

/* ---------------- RENDER ---------------- */
function renderAll(data) {
  renderResults(data);
  renderGroups(data);
}

/* ---------------- RESULTS ---------------- */
function renderResults(matches) {
  const container = document.getElementById("results");

  const completed = matches
    .filter(m => String(m.Played || "").trim().toUpperCase() === "TRUE")
    .reverse();

  container.innerHTML = "<h2>Live Results</h2>";

  completed.forEach(m => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.textContent = `${m.TeamA} ${m.ScoreA} - ${m.ScoreB} ${m.TeamB}`;
    container.appendChild(div);
  });
}

/* ---------------- GROUPS ---------------- */
function renderGroups(matches) {
  const container = document.getElementById("groups");
  container.innerHTML = "";

  const groups = groupMatches(matches);

  Object.keys(groups).sort().forEach(g => {
    const ladder = sortLadder(buildLadder(groups[g]));

    const wrapper = document.createElement("div");
    wrapper.className = "group";

    const title = document.createElement("h2");
    title.textContent = "Group " + g;

    const table = document.createElement("table");

    table.innerHTML = `
      <tr>
        <th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th>
        <th>F</th><th>A</th><th>Pts</th>
      </tr>
    `;

    ladder.forEach(t => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${t.team}</td>
        <td>${t.P}</td>
        <td>${t.W}</td>
        <td>${t.D}</td>
        <td>${t.L}</td>
        <td>${t.F}</td>
        <td>${t.A}</td>
        <td>${t.Pts}</td>
      `;

      table.appendChild(row);
    });

    wrapper.appendChild(title);
    wrapper.appendChild(table);
    container.appendChild(wrapper);
  });
}

/* ---------------- CONTROLLED UPDATE LOOP ---------------- */
async function checkForUpdates() {
  const data = await fetchData();
  const hash = createHash(data);

  if (hash !== lastHash) {
    lastHash = hash;
    pendingUpdate = true;

    // show soft indicator instead of forcing redraw
    document.getElementById("updateBanner").style.display = "block";
  }
}

/* ---------------- MANUAL REFRESH ---------------- */
async function manualRefresh() {
  const data = await fetchData();

  lastHash = createHash(data);
  pendingUpdate = false;

  document.getElementById("updateBanner").style.display = "none";

  renderAll(data);
}

/* ---------------- INIT ---------------- */
manualRefresh();          // initial load
setInterval(checkForUpdates, 15000); // silent check every 15s

</script>

</body>
</html>
