<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 15px;
      border-radius: 10px;
    }

    h2 {
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td {
      border: 1px solid #333;
      padding: 6px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Matches</h2>
  <div id="matches"></div>
</div>

<div class="card">
  <h2>Tables</h2>
  <div id="tables"></div>
</div>

<div class="card">
  <h2>Semi Finals</h2>
  <div id="semis"></div>
</div>

<div class="card">
  <h2>Final</h2>
  <div id="finals"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwA6VoHXOLMb7OmdlNHdhiTfe06iY5D__FiThjEWlFjDfMmsaG8XeHN7AaJSDfvkqebkQ/exec";

// Fetch a specific range
async function fetchRange(sheet, range) {
  const res = await fetch(`${API_URL}?sheet=${sheet}&range=${range}`);
  return await res.json();
}

// Render grid exactly like sheet
function renderGrid(data) {
  let html = "<table>";

  data.forEach(row => {
    html += "<tr>";
    row.forEach(cell => {
      html += `<td>${cell ?? ""}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";
  return html;
}

// Load all sections
async function loadDashboard() {
  try {
    const matches = await fetchRange("MATCHES_PLAYED", "A1:F13");
    const tables = await fetchRange("TABLES_SORTED", "A1:I15");
    const semis = await fetchRange("SEMIS", "A1:E5");
    const finals = await fetchRange("FINALS", "A1:E5");
    const results = await fetchRange("RESULTS_DATA", "A1:A8");

    document.getElementById("matches").innerHTML = renderGrid(matches);
    document.getElementById("tables").innerHTML = renderGrid(tables);
    document.getElementById("semis").innerHTML = renderGrid(semis);
    document.getElementById("finals").innerHTML = renderGrid(finals);
    document.getElementById("results").innerHTML = renderGrid(results);

  } catch (err) {
    console.error("Dashboard error:", err);
  }
}

// Initial load
loadDashboard();

// Optional: auto-refresh every 10 seconds
setInterval(loadDashboard, 10000);
</script>

</body>
</html>
