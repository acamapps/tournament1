<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 15px;
      border-radius: 10px;
    }

    h2 {
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td {
      border: 1px solid #333;
      padding: 6px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Matches</h2>
  <div id="matches"></div>
</div>

<div class="card">
  <h2>Group A</h2>
  <div id="groupA"></div>
</div>

<div class="card">
  <h2>Group B</h2>
  <div id="groupB"></div>
</div>

<div class="card">
  <h2>Semi Finals</h2>
  <div id="semis"></div>
</div>

<div class="card">
  <h2>3rd Place Playoff</h2>
  <div id="tppo"></div>
</div>

<div class="card">
  <h2>Final</h2>
  <div id="final"></div>
</div>

<div class="card">
  <h2>Results</h2>
  <div id="results"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwA6VoHXOLMb7OmdlNHdhiTfe06iY5D__FiThjEWlFjDfMmsaG8XeHN7AaJSDfvkqebkQ/exec";

// Fetch a specific range
async function fetchRange(sheet, range) {
  const res = await fetch(`${API_URL}?sheet=${sheet}&range=${range}`);
  return await res.json();
}

// Render grid exactly like sheet
function renderGrid(data) {
  let html = "<table>";

  data.forEach(row => {
    html += "<tr>";
    row.forEach(cell => {
      html += `<td>${cell ?? ""}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";
  return html;
}

// Load all sections
async function loadDashboard() {
  try {
    const matches = await fetchRange("MATCHES_PLAYED", "A1:H13");
    const groupA = await fetchRange("TABLES", "A2:I6");
    const groupB = await fetchRange("TABLES", "L2:T6");
    const semis = await fetchRange("SEMIS", "A1:E5");
    const tppo = await fetchRange("TPPO", "A2:E2");
    const final = await fetchRange("FINAL", "A2:E2");
    const results = await fetchRange("RESULTS_DATA", "A1:A8");

    document.getElementById("matches").innerHTML = renderGrid(matches);
    document.getElementById("groupA").innerHTML = renderGrid(groupA);
    document.getElementById("groupB").innerHTML = renderGrid(groupB);
    document.getElementById("semis").innerHTML = renderGrid(semis);
    document.getElementById("tppo").innerHTML = renderGrid(tppo);
    document.getElementById("final").innerHTML = renderGrid(final);
    document.getElementById("results").innerHTML = renderGrid(results);

  } catch (err) {
    console.error("Dashboard error:", err);
  }
}

// Initial load
loadDashboard();

// Optional: auto-refresh every 10 seconds
setInterval(loadDashboard, 10000);
</script>

</body>
</html>
