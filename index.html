<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard (Trigger-Based)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .section { margin-bottom: 30px; }

    .results {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media(min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    .group {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .grid-header, .grid-row {
      display: grid;
      grid-template-columns: 2fr repeat(7, 1fr);
      padding: 6px 0;
      align-items: center;
    }

    .grid-header {
      font-weight: bold;
      border-bottom: 2px solid #ddd;
      background: #fafafa;
    }

    .grid-row {
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    #updateBanner {
      display: none;
      margin-bottom: 10px;
      padding: 10px;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>🏆 Tournament Dashboard</h1>

<div id="updateBanner">
  🟡 New update received from Google Sheets
</div>

<div id="results" class="section results">
  <h2>Live Results</h2>
</div>

<div id="groups" class="grid section"></div>

<script>

const BASE_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAQdMH5d5-6lGZzC9BD0RRnFu9wrnZSWMD93pKCV7X_yrbcKCDsnxKX1gzSgf6fxvSxTWPZNKwkDBl/pub?gid=892945414&single=true&output=csv";

/* ---------------- STATE ---------------- */
let lastTrigger = "";
let resultMap = {};
let groupMap = {};

/* ---------------- FETCH ---------------- */
async function fetchData() {
  const res = await fetch(BASE_URL + "&_=" + Date.now(), {
    cache: "no-store"
  });

  const text = await res.text();

  const rows = text.trim()
    .split("\n")
    .map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/));

  const headers = rows[0];

  return rows.slice(1)
    .filter(r => r.join("").trim() !== "")
    .map(row => {
      let obj = {};
      headers.forEach((h, i) => {
        obj[h.trim()] = (row[i] || "").trim();
      });
      return obj;
    });
}

/* ---------------- INIT RESULTS ---------------- */
function initResults(matches) {
  const container = document.getElementById("results");

  if (!container.dataset.init) {
    container.innerHTML = "<h2>Live Results</h2>";
    container.dataset.init = "true";
  }

  matches.forEach(m => {
    const id = m.MatchID;

    if (!resultMap[id]) {
      const div = document.createElement("div");
      div.className = "result-item";
      container.appendChild(div);

      resultMap[id] = {
        el: div,
        data: m
      };
    } else {
      resultMap[id].data = m;
    }
  });
}

/* ---------------- UPDATE RESULTS ---------------- */
function updateResults() {
  Object.values(resultMap).forEach(r => {
    const m = r.data;

    const played = String(m.Played || "").toUpperCase() === "TRUE";

    if (!played) {
      r.el.classList.add("hidden");
      return;
    }

    r.el.classList.remove("hidden");

    r.el.textContent =
      `${m.TeamA} ${m.ScoreA} - ${m.ScoreB} ${m.TeamB}`;
  });
}

/* ---------------- GROUPS ---------------- */
function updateGroups(matches) {
  const container = document.getElementById("groups");

  const groups = {};

  matches.forEach(m => {
    const g = m.Group || "UNKNOWN";
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });

  Object.keys(groups).forEach(g => {
    const list = groups[g];

    if (!groupMap[g]) {
      const wrapper = document.createElement("div");
      wrapper.className = "group";

      const title = document.createElement("h2");
      title.textContent = "Group " + g;

      const grid = document.createElement("div");

      grid.innerHTML = `
        <div class="grid-header">
          <div>Team</div><div>P</div><div>W</div><div>D</div>
          <div>L</div><div>F</div><div>A</div><div>Pts</div>
        </div>
      `;

      wrapper.appendChild(title);
      wrapper.appendChild(grid);
      container.appendChild(wrapper);

      groupMap[g] = { grid, rows: {} };
    }

    const gNode = groupMap[g];

    const table = {};

    list.forEach(m => {
      if (String(m.Played || "").toUpperCase() !== "TRUE") return;

      const a = m.TeamA;
      const b = m.TeamB;
      const sa = +m.ScoreA || 0;
      const sb = +m.ScoreB || 0;

      if (!table[a]) table[a] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };
      if (!table[b]) table[b] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };

      table[a].P++; table[b].P++;
      table[a].F += sa; table[a].A += sb;
      table[b].F += sb; table[b].A += sa;

      if (sa > sb) {
        table[a].W++; table[b].L++; table[a].Pts += 3;
      } else if (sb > sa) {
        table[b].W++; table[a].L++; table[b].Pts += 3;
      } else {
        table[a].D++; table[b].D++; table[a].Pts++; table[b].Pts++;
      }
    });

    const ladder = Object.entries(table).map(([team, s]) => ({ team, ...s }));

    ladder.forEach(t => {
      const key = g + ":" + t.team;

      if (!gNode.rows[key]) {
        const row = document.createElement("div");
        row.className = "grid-row";

        row.innerHTML =
          `<div></div><div></div><div></div><div></div>` +
          `<div></div><div></div><div></div><div></div>`;

        gNode.grid.appendChild(row);
        gNode.rows[key] = row;
      }

      const r = gNode.rows[key].children;

      r[0].textContent = t.team;
      r[1].textContent = t.P;
      r[2].textContent = t.W;
      r[3].textContent = t.D;
      r[4].textContent = t.L;
      r[5].textContent = t.F;
      r[6].textContent = t.A;
      r[7].textContent = t.Pts;
    });
  });
}

/* ---------------- MANUAL REFRESH (ONLY ENTRY POINT) ---------------- */
async function manualRefresh() {
  const data = await fetchData();

  initResults(data);
  updateResults();
  updateGroups(data);

  document.getElementById("updateBanner").style.display = "none";
}

/* ---------------- TRIGGER CHECK (ONLY CELL Z1) ---------------- */
async function checkTrigger() {
  const res = await fetch(BASE_URL + "&range=Z1");
  const text = await res.text();

  const trigger = text.trim();

  if (trigger && trigger !== lastTrigger) {
    lastTrigger = trigger;

    document.getElementById("updateBanner").style.display = "block";

    manualRefresh();
  }
}

/* ---------------- START ---------------- */
manualRefresh();
setInterval(checkTrigger, 3000);

</script>

</body>
</html>
