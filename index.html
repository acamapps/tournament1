<script>
const API_URL = "YOUR_DEPLOYED_URL";

async function fetchSheet(sheet) {
  const res = await fetch(`${API_URL}?sheet=${sheet}`);
  return await res.json();
}

function renderMatches(data) {
  return data.map(m => `
    <div style="padding:6px;border-bottom:1px solid #333">
      <b>${m.TeamA}</b> ${m.ScoreA} - ${m.ScoreB} <b>${m.TeamB}</b>
      <span style="float:right;color:#aaa">${m.WINNER ? "Winner: " + m.WINNER : "TBD"}</span>
    </div>
  `).join("");
}

function renderTables(data) {
  return data.map(t => `
    <div style="padding:4px">
      ${Object.values(t).slice(0,3).join(" | ")}
    </div>
  `).join("");
}

async function loadDashboard() {
  try {
    const matches = await fetchSheet("MATCHES_PLAYED");
    const tables = await fetchSheet("TABLES_SORTED");
    const semis = await fetchSheet("SEMIS");
    const finals = await fetchSheet("FINALS");

    document.getElementById("matches").innerHTML =
      renderMatches(matches);

    document.getElementById("tables").innerHTML =
      renderTables(tables);

    document.getElementById("semis").innerHTML =
      semis.length
        ? semis.map(s => `<div>${JSON.stringify(s)}</div>`).join("")
        : "TBD";

    document.getElementById("finals").innerHTML =
      finals.length
        ? finals.map(f => `<div>${JSON.stringify(f)}</div>`).join("")
        : "TBD";

  } catch (err) {
    console.error("Dashboard load error:", err);
  }
}

loadDashboard();
</script>
