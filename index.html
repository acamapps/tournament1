<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard (Live Stream Mode)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .section { margin-bottom: 30px; }

    .results, .group {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      transition: background 0.3s ease;
    }

    .updated {
      background: #e8f5ff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    th { background: #fafafa; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media(min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body>

<h1>🏆 Tournament Dashboard (Live)</h1>

<div id="results" class="section results">
  <h2>Live Results</h2>
</div>

<div id="groups" class="grid section"></div>

<script>

const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAQdMH5d5-6lGZzC9BD0RRnFu9wrnZSWMD93pKCV7X_yrbcKCDsnxKX1gzSgf6fxvSxTWPZNKwkDBl/pub?gid=892945414&single=true&output=csv";

/* ---------------- STATE ---------------- */
let state = {
  matches: [],
  lastSnapshot: ""
};

/* ---------------- FETCH ---------------- */
async function fetchData() {
  const res = await fetch(BASE_URL + "&_=" + Date.now(), {
    cache: "no-store"
  });

  const text = await res.text();

  const rows = text.trim()
    .split("\n")
    .map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/));

  const headers = rows[0];

  return rows.slice(1)
    .filter(r => r.join("").trim() !== "")
    .map(row => {
      let obj = {};
      headers.forEach((h, i) => {
        obj[h.trim()] = (row[i] || "").trim();
      });
      return obj;
    });
}

/* ---------------- HASH ---------------- */
function createHash(data) {
  return data.map(r =>
    `${r.Group}|${r.TeamA}|${r.TeamB}|${r.ScoreA}|${r.ScoreB}|${r.Played}`
  ).join("~");
}

/* ---------------- DIFF ENGINE ---------------- */
function diff(oldData, newData) {
  const map = new Map();

  oldData.forEach(m => {
    map.set(m.TeamA + m.TeamB + m.ScoreA + m.ScoreB, m);
  });

  const changes = [];

  newData.forEach(m => {
    const key = m.TeamA + m.TeamB + m.ScoreA + m.ScoreB;

    if (!map.has(key)) {
      changes.push({ type: "update", match: m });
    }
  });

  return changes;
}

/* ---------------- GROUP ---------------- */
function groupMatches(matches) {
  const groups = {};
  matches.forEach(m => {
    const g = m.Group || "UNKNOWN";
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });
  return groups;
}

/* ---------------- LADDER ---------------- */
function buildLadder(matches) {
  const table = {};

  matches.forEach(m => {
    if ((m.Played || "").toUpperCase() !== "TRUE") return;

    const a = m.TeamA;
    const b = m.TeamB;
    const sa = parseInt(m.ScoreA);
    const sb = parseInt(m.ScoreB);

    if (!table[a]) table[a] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };
    if (!table[b]) table[b] = { P:0,W:0,D:0,L:0,F:0,A:0,Pts:0 };

    table[a].P++; table[b].P++;
    table[a].F += sa; table[a].A += sb;
    table[b].F += sb; table[b].A += sa;

    if (sa > sb) {
      table[a].W++; table[b].L++; table[a].Pts += 3;
    } else if (sb > sa) {
      table[b].W++; table[a].L++; table[b].Pts += 3;
    } else {
      table[a].D++; table[b].D++; table[a].Pts++; table[b].Pts++;
    }
  });

  return Object.entries(table).map(([team, s]) => ({ team, ...s }));
}

function sortLadder(ladder) {
  return ladder.sort((a,b) =>
    b.Pts - a.Pts ||
    (b.F - b.A) - (a.F - a.A) ||
    b.F - a.F ||
    a.team.localeCompare(b.team)
  );
}

/* ---------------- LIVE RESULTS (PATCH ONLY) ---------------- */
const resultNodes = new Map();

function updateResults(matches) {
  const container = document.getElementById("results");

  const completed = matches
    .filter(m => (m.Played || "").toUpperCase() === "TRUE")
    .reverse();

  completed.forEach((m, i) => {
    const key = m.TeamA + m.TeamB + i;

    let el = resultNodes.get(key);

    if (!el) {
      el = document.createElement("div");
      el.className = "result-item";
      container.appendChild(el);
      resultNodes.set(key, el);
    }

    const text = `${m.TeamA} ${m.ScoreA} - ${m.ScoreB} ${m.TeamB}`;

    if (el.textContent !== text) {
      el.textContent = text;

      el.classList.add("updated");
      setTimeout(() => el.classList.remove("updated"), 300);
    }
  });
}

/* ---------------- GROUPS (FULL REACTIVE BUT STABLE) ---------------- */
function updateGroups(matches) {
  const container = document.getElementById("groups");
  container.innerHTML = "";

  const groups = groupMatches(matches);

  Object.keys(groups).sort().forEach(g => {
    const ladder = sortLadder(buildLadder(groups[g]));

    const wrapper = document.createElement("div");
    wrapper.className = "group";

    const title = document.createElement("h2");
    title.textContent = "Group " + g;
    wrapper.appendChild(title);

    const table = document.createElement("table");

    table.innerHTML = `
      <tr>
        <th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th>
        <th>F</th><th>A</th><th>Pts</th>
      </tr>
    `;

    ladder.forEach(t => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${t.team}</td>
        <td>${t.P}</td>
        <td>${t.W}</td>
        <td>${t.D}</td>
        <td>${t.L}</td>
        <td>${t.F}</td>
        <td>${t.A}</td>
        <td>${t.Pts}</td>
      `;

      table.appendChild(row);
    });

    wrapper.appendChild(table);
    container.appendChild(wrapper);
  });
}

/* ---------------- STREAM LOOP (WEBSOCKET STYLE) ---------------- */
async function tick() {
  const data = await fetchData();

  const snapshot = createHash(data);

  if (snapshot === state.lastSnapshot) {
    requestAnimationFrame(tick);
    return;
  }

  const changes = diff(state.matches, data);

  state.matches = data;
  state.lastSnapshot = snapshot;

  // "event-driven updates"
  if (changes.length > 0) {
    updateResults(data);
    updateGroups(data);
  }

  requestAnimationFrame(tick);
}

/* ---------------- START ---------------- */
tick();

</script>

</body>
</html>
