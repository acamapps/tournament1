<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; }
    .card { background:#222; padding:15px; margin:10px; border-radius:10px; }
    h2 { border-bottom:1px solid #444; padding-bottom:5px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Completed Matches</h2>
  <div id="matches"></div>
</div>

<div class="card">
  <h2>Tables</h2>
  <div id="tables"></div>
</div>

<div class="card">
  <h2>Semi Finals</h2>
  <div id="semis"></div>
</div>

<div class="card">
  <h2>Final</h2>
  <div id="finals"></div>
</div>

<script>
const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";

async function fetchData(endpoint) {
  const res = await fetch(`${API_URL}?sheet=${endpoint}`);
  return res.json();
}

function renderList(container, data, fields) {
  let html = "";
  data.forEach(row => {
    html += `<div>`;
    fields.forEach(f => html += `${row[f]} `);
    html += `</div>`;
  });
  document.getElementById(container).innerHTML = html;
}

async function load() {
  const matches = await fetch(`${API_URL}?sheet=MATCHES_PLAYED`).then(r => r.json());
  const tables = await fetch(`${API_URL}?sheet=TABLES_SORTED`).then(r => r.json());
  const semis = await fetch(`${API_URL}?sheet=SEMIS`).then(r => r.json());
  const finals = await fetch(`${API_URL}?sheet=FINALS`).then(r => r.json());

  renderList("matches", matches, Object.keys(matches[0] || {}));
  renderList("tables", tables, Object.keys(tables[0] || {}));
  renderList("semis", semis, Object.keys(semis[0] || {}));
  renderList("finals", finals, Object.keys(finals[0] || {}));
}

load();
</script>

</body>
</html>
