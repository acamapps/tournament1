<!DOCTYPE html>
<html>
<head>
  <title>Tournament Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #e0e0e0;
      margin: 0;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .card {
      background: #1b1b1b;
      padding: 18px;
      margin: 15px auto;
      border-radius: 14px;
      max-width: 900px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin: 0 0 10px 0;
      padding-bottom: 6px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 2px solid #444;
      letter-spacing: 0.5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td {
      padding: 8px 6px;
      border-bottom: 1px solid #2a2a2a;
      line-height: 1.4;
    }

    tr:first-child td {
      font-weight: bold;
      color: #bbb;
      border-bottom: 2px solid #444;
    }

    tr:hover td {
      background: #2a2a2a;
    }

    /* Emphasis for key sections */
    #final table td {
      font-size: 18px;
      font-weight: bold;
    }

    #semis table td {
      font-weight: 500;
    }
    
    #matchesCard h2 { color: #4fc3f7; }
    #groupACard h2 { color: #81c784; }
    #groupBCard h2 { color: #81c784; }
    #semisCard h2 { color: #eb00be; }
    #tppoCard h2 { color: #961a1a; }
    #finalCard h2 { color: #ffd54f; text-shadow: 0 0 6px rgba(255,213,79,0.4);}
    #resultsCard h2 { color: #e57373; }
    #resultsCard td {
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>

<body>

<h1>Tournament Dashboard</h1>

<div class="card" id="matchesCard">
  <h2>Group Matches</h2>
  <div id="matches"></div>
</div>

<div class="card" id="groupACard">
  <h2>Group A</h2>
  <div id="groupA"></div>
</div>

<div class="card" id="groupBCard">
  <h2>Group B</h2>
  <div id="groupB"></div>
</div>

<div class="card" id="semisCard">
  <h2>Semi Finals</h2>
  <div id="semis"></div>
</div>

<div class="card" id="tppoCard">
  <h2>3rd Place Playoff</h2>
  <div id="tppo"></div>
</div>

<div class="card" id="finalCard">
  <h2>Final</h2>
  <div id="final"></div>
</div>

<div class="card" id="resultsCard">
  <h2>Results</h2>
  <div id="results"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwA6VoHXOLMb7OmdlNHdhiTfe06iY5D__FiThjEWlFjDfMmsaG8XeHN7AaJSDfvkqebkQ/exec";

// Fetch a specific range
async function fetchRange(sheet, range) {
  const res = await fetch(`${API_URL}?sheet=${sheet}&range=${range}`);
  return await res.json();
}

// Generate colours dynamically
function generateTeamColours(teams) {
  const colours = {};
  const total = teams.length;

  teams.forEach((team, i) => {
    const hue = Math.floor((i / total) * 360);
    colours[team] = `hsl(${hue}, 65%, 55%)`;
  });

  return colours;
}

// Standard grid renderer (with team colours)
function renderGrid(data, TEAM_COLOURS = {}) {

  data = data.filter(row => row.some(cell => cell !== ""));

  let html = "<table>";

  data.forEach(row => {
    html += "<tr>";

    row.forEach(cell => {

      let style = "text-align:center;";

      if (TEAM_COLOURS[cell]) {
        style += `
          color:${TEAM_COLOURS[cell]};
          font-weight:bold;
        `;
      }

      html += `<td style="${style}">${cell ?? ""}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";
  return html;
}

// Special renderer for semis
function renderSemis(data, TEAM_COLOURS = {}) {

  data = data.filter(row => row.some(cell => cell !== ""));

  let html = "<table>";

  data.forEach((row, i) => {
    html += "<tr>";

    row.forEach(cell => {

      let style = "text-align:center;";

      if (TEAM_COLOURS[cell]) {
        style += `
          color:${TEAM_COLOURS[cell]};
          font-weight:bold;
        `;
      }

      // Apply heading style to row 1 and 3
      if (i === 0 || i === 2) {
        style += `
          font-weight:bold;
          color:#bbb;
          border-bottom:2px solid #444;
        `;
      }

      html += `<td style="${style}">${cell ?? ""}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";
  return html;
}

// Load dashboard
async function loadDashboard() {
  try {
    const matches = await fetchRange("MATCHES_PLAYED", "A1:I13");
    const groupA = await fetchRange("TABLES", "A2:I6");
    const groupB = await fetchRange("TABLES", "K2:S6");
    const semis = await fetchRange("SEMIS", "A1:E5");
    const tppo = await fetchRange("TPPO", "A2:E2");
    const final = await fetchRange("FINAL", "A2:E2");
    const results = await fetchRange("RESULTS", "A1:A8");

    // 🔥 NEW: get teams dynamically
    const teamsRaw = await fetchRange("TEAMS", "A2:A20");
    const teams = teamsRaw.flat().filter(t => t);

    const TEAM_COLOURS = generateTeamColours(teams);

    document.getElementById("matches").innerHTML = renderGrid(matches, TEAM_COLOURS);
    document.getElementById("groupA").innerHTML = renderGrid(groupA, TEAM_COLOURS);
    document.getElementById("groupB").innerHTML = renderGrid(groupB, TEAM_COLOURS);
    document.getElementById("semis").innerHTML = renderSemis(semis, TEAM_COLOURS);
    document.getElementById("tppo").innerHTML = renderGrid(tppo, TEAM_COLOURS);
    document.getElementById("final").innerHTML = renderGrid(final, TEAM_COLOURS);
    document.getElementById("results").innerHTML = renderGrid(results, TEAM_COLOURS);

  } catch (err) {
    console.error("Dashboard error:", err);
  }
}

// Initial load
loadDashboard();

// Auto-refresh
setInterval(loadDashboard, 10000);
</script>

</body>
</html>
