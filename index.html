<!DOCTYPE html>
<html>
<head>
  <title>🏅 Tournament Dashboard 🏅</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #e0e0e0;
      margin: 0;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .card {
      background: #1b1b1b;
      padding: 18px;
      margin: 15px auto;
      border-radius: 14px;
      max-width: 900px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin: 0 0 10px 0;
      padding-bottom: 6px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 2px solid #444;
      letter-spacing: 0.5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td {
      padding: 8px 6px;
      border-bottom: 1px solid #2a2a2a;
      line-height: 1.4;
    }

    tr:first-child td {
      font-weight: bold;
      color: #bbb;
      border-bottom: 2px solid #444;
    }

    tr:hover td {
      background: #2a2a2a;
    }

    /* Emphasis for key sections */
    #final table td {
      font-size: 18px;
      font-weight: bold;
    }

    #semis table td {
      font-weight: 500;
    }
    
    #matchesCard h2 { color: #4fc3f7; }   /* blue */
    #groupACard h2 { color: #81c784; }    /* green */
    #groupBCard h2 { color: #81c784; }
    #semisCard h2 { color: #eb00be; }     /* pink */
    #tppoCard h2 { color: #961a1a; }     /* brown */
    #finalCard h2 { color: #ffd54f; text-shadow: 0 0 6px rgba(255,213,79,0.4); }     /* gold */
    #resultsCard h2 { color: #e57373; }   /* red */
    #matchesCard {
      background: #3b19ff7e;
      border: 1px solid #ffffff;
    }  
    #groupACard {
      background: #61ce7371;
      border: 1px solid #ffffff;
    }    
    #groupBCard {
      background: #61ce7371;
      border: 1px solid #ffffff;
    }    
    #semisCard {
      background: #ffa0ea4f;
      border: 1px solid #ffffff;
    }    
    #tppoCard {
      background: linear-gradient(135deg, #2a1a1a, #1b1b1b);
      border: 1px solid #961a1a;
    }
    #finalCard {
      background: linear-gradient(135deg, #2a2400, #1b1b1b);
      border: 1px solid #ffd54f;
      box-shadow: 0 0 18px rgba(255, 213, 79, 0.25);
    }
    #resultsCard {
      font-size: 18px;
      font-weight: 600;
      background: #558bff73;
      border: 1px solid #ffffff;
    }
  </style>
</head>

<body>

<h1>🏅 Tournament Dashboard 🏅</h1>

<div class="card" id="matchesCard">
  <h2>Group Matches</h2>
  <div id="matches"></div>
</div>

<div class="card" id="groupACard">
  <h2>Group A</h2>
  <div id="groupA"></div>
</div>

<div class="card" id="groupBCard">
  <h2>Group B</h2>
  <div id="groupB"></div>
</div>

<div class="card" id="semisCard">
  <h2>Semi Finals</h2>
  <div id="semis"></div>
</div>

<div class="card" id="tppoCard">
  <h2>3rd Place Playoff</h2>
  <div id="tppo"></div>
</div>

<div class="card" id="finalCard">
  <h2>Final</h2>
  <div id="final"></div>
</div>

<div class="card" id="resultsCard">
  <h2>Results</h2>
  <div id="results"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwA6VoHXOLMb7OmdlNHdhiTfe06iY5D__FiThjEWlFjDfMmsaG8XeHN7AaJSDfvkqebkQ/exec";

// Fetch a specific range
async function fetchRange(sheet, range) {
  const res = await fetch(`${API_URL}?sheet=${sheet}&range=${range}`);
  return await res.json();
}

// Render grid with formatting improvements
function renderGrid(data) {

  // Remove empty rows
  data = data.filter(row => row.some(cell => cell !== ""));

  let html = "<table>";

  data.forEach((row, i) => {
    html += "<tr>";

    row.forEach(cell => {
      html += `
        <td style="text-align:center">
          ${cell ?? ""}
        </td>
      `;
    });

    html += "</tr>";
  });

  html += "</table>";
  return html;
}

// Load all sections
async function loadDashboard() {
  try {
    const matches = await fetchRange("MATCHES_PLAYED", "A1:I13");
    const groupA = await fetchRange("TABLES", "A2:I6");
    const groupB = await fetchRange("TABLES", "K2:S6");
    const semis = await fetchRange("SEMIS", "A1:H5");
    const tppo = await fetchRange("TPPO", "A2:H2");
    const final = await fetchRange("FINAL", "A2:H2");
    const results = await fetchRange("RESULTS", "A1:A8");

    document.getElementById("matches").innerHTML = renderGrid(matches);
    document.getElementById("groupA").innerHTML = renderGrid(groupA);
    document.getElementById("groupB").innerHTML = renderGrid(groupB);
    document.getElementById("semis").innerHTML = renderGrid(semis);
    document.getElementById("tppo").innerHTML = renderGrid(tppo);
    document.getElementById("final").innerHTML = renderGrid(final);
    document.getElementById("results").innerHTML = renderGrid(results);

  } catch (err) {
    console.error("Dashboard error:", err);
  }
}

// Initial load
loadDashboard();

// Auto-refresh every 10 seconds
setInterval(loadDashboard, 10000);
</script>

</body>
</html>
